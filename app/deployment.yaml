apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: ayan241/argocd:latest  # updated automatically by CI
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
