<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App — ArgoCD Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 1rem; }
    form { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; }
    .add-btn { background: #4f46e5; color: #fff; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
    li.done span { text-decoration: line-through; color: #999; }
    span { flex: 1; }
    .del-btn { background: #ef4444; color: #fff; font-size: 0.8rem; }
    .toggle-btn { background: #10b981; color: #fff; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <form id="todo-form">
    <input id="todo-input" type="text" placeholder="What needs doing?" required />
    <button class="add-btn" type="submit">Add</button>
  </form>
  <ul id="todo-list"></ul>

  <script>
    const list = document.getElementById('todo-list');
    const form = document.getElementById('todo-form');
    const input = document.getElementById('todo-input');

    async function load() {
      const res = await fetch('/api/todos');
      const todos = await res.json();
      list.innerHTML = '';
      todos.forEach(render);
    }

    function render(todo) {
      const li = document.createElement('li');
      if (todo.done) li.classList.add('done');
      li.innerHTML = `
        <span>${todo.text}</span>
        <button class="toggle-btn" onclick="toggle(${todo.id})">✓</button>
        <button class="del-btn" onclick="remove(${todo.id})">✕</button>
      `;
      list.appendChild(li);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      await fetch('/api/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input.value })
      });
      input.value = '';
      load();
    });

    async function toggle(id) {
      await fetch(`/api/todos/${id}`, { method: 'PATCH' });
      load();
    }

    async function remove(id) {
      await fetch(`/api/todos/${id}`, { method: 'DELETE' });
      load();
    }

    load();
  </script>
</body>
</html>
