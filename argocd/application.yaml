apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AyanWarsame/ArgoCD-PRACTICAL-EXAMPLE.git
    targetRevision: main
    path: app  # ArgoCD watches this folder — deployment, service, ingress

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true      # delete resources removed from git
      selfHeal: true   # revert manual changes in the cluster
    syncOptions:
      - CreateNamespace=true
